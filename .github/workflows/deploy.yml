name: deploy

# Push to main → build Next standalone → push static assets to the
# CloudFront S3 origin → bundle Lambda zip → swap function code →
# invalidate CloudFront. AWS auth is OIDC against the
# gha-rvbr-platform-production role provisioned in
# tfe_rv-rvbr-platform/application-infrastructure/gha-oidc.tf.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: sa-east-1
  AWS_ACCOUNT_ID: "397142353537"
  LAMBDA_NAME: hack-26-production
  CF_ALIAS: hack-26.redplatform.com.br
  # Bucket names follow the redventures-brasil/s3/aws module's naming
  # convention which we can't predict here — resolved at runtime.
  ASSETS_BUCKET_HINT: hack-26-assets
  DEPLOY_BUCKET_HINT: hack-26-lambda-deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        # Install everything including optionalDependencies — Next's build
        # resolver still needs better-sqlite3 at compile time even though
        # lib/db/queries.ts only dynamic-imports it. The native binary ends
        # up dead code at runtime in prod (DYNAMO_SUBMISSIONS is set), but
        # GHA's Ubuntu x86_64 build matches Lambda's runtime arch so it's
        # safe to ship.
        run: npm ci

      - name: Build Next.js (standalone)
        run: npm run build

      - name: Assemble Lambda bundle
        # Standalone emits a self-contained server at .next/standalone with
        # its own node_modules. We add our Lambda entrypoint + public/ so
        # routes like /favicon.ico still resolve when CloudFront forwards
        # to the API GW origin. serverless-http is not imported by any Next
        # route so the tracer misses it — copy it in manually.
        run: |
          set -euo pipefail
          cp lambda/index.cjs .next/standalone/index.cjs
          cp -R public .next/standalone/public
          mkdir -p .next/standalone/node_modules/serverless-http
          cp -R node_modules/serverless-http/. .next/standalone/node_modules/serverless-http/
          # Static assets are served from S3 via CloudFront — keep them
          # out of the Lambda zip to shave ~MBs.
          (cd .next/standalone && zip -qr "$GITHUB_WORKSPACE/lambda.zip" .)
          ls -la lambda.zip

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/gha-rvbr-platform-production
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve bucket names
        id: buckets
        run: |
          set -euo pipefail
          ALL="$(aws s3api list-buckets --query 'Buckets[].Name' --output text)"
          pick() {
            # First match in the account whose name contains the hint and
            # ends with the workspace, e.g. hack-26-assets-production-xxx.
            for b in $ALL; do
              case "$b" in
                *"$1"*production*) echo "$b"; return 0 ;;
              esac
            done
            echo "no bucket matched hint '$1' (account=$AWS_ACCOUNT_ID)" >&2
            return 1
          }
          ASSETS="$(pick "$ASSETS_BUCKET_HINT")"
          DEPLOY="$(pick "$DEPLOY_BUCKET_HINT")"
          echo "assets=$ASSETS" >> "$GITHUB_OUTPUT"
          echo "deploy=$DEPLOY" >> "$GITHUB_OUTPUT"
          echo "assets bucket: $ASSETS"
          echo "deploy bucket: $DEPLOY"

      - name: Sync /_next/static to S3 (immutable cache)
        run: |
          aws s3 sync .next/static "s3://${{ steps.buckets.outputs.assets }}/_next/static" \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

      - name: Upload Lambda zip to deploy bucket
        id: upload
        run: |
          set -euo pipefail
          KEY="hack-26-${GITHUB_SHA}.zip"
          aws s3 cp lambda.zip "s3://${{ steps.buckets.outputs.deploy }}/${KEY}"
          echo "key=${KEY}" >> "$GITHUB_OUTPUT"

      - name: Update Lambda function code
        # `lambda wait function-updated` would need lambda:GetFunctionConfiguration
        # on the GHA role — it's not in gha-rvbr-platform-production today.
        # Skipping the wait is safe: Lambda swaps versions atomically once the
        # update finishes processing (usually <30s).
        run: |
          set -euo pipefail
          aws lambda update-function-code \
            --function-name "${LAMBDA_NAME}" \
            --s3-bucket "${{ steps.buckets.outputs.deploy }}" \
            --s3-key "${{ steps.upload.outputs.key }}" \
            --publish \
            --no-cli-pager > /dev/null
          echo "update-function-code dispatched"

      - name: Invalidate CloudFront
        run: |
          set -euo pipefail
          DIST_ID="$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Aliases.Items && contains(Aliases.Items, \`${CF_ALIAS}\`)].Id | [0]" \
            --output text)"
          if [ -z "${DIST_ID}" ] || [ "${DIST_ID}" = "None" ]; then
            echo "No CloudFront distribution found for alias ${CF_ALIAS}" >&2
            exit 1
          fi
          echo "Invalidating ${DIST_ID}"
          aws cloudfront create-invalidation \
            --distribution-id "${DIST_ID}" \
            --paths "/*" \
            --no-cli-pager > /dev/null
